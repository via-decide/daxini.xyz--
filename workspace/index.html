<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zayvora Workspace — Reasoning Console</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Core Styles -->
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/workspace.css">
</head>
<body>

  <!-- Site Nav (Reused) -->
  <nav class="site-nav">
    <a href="../index.html" class="nav-brand">
      <div class="nav-pulse"></div>
      DAXINI
    </a>
    <div class="nav-links">
      <span class="mono" style="font-size: 11px; color: var(--tx3);">WORKSPACE // SESSION_01</span>
    </div>
    <div style="margin-left: auto;">
      <button id="dev-mode-toggle" class="mono" style="background: none; border: 1px solid var(--bd); color: var(--tx2); padding: 4px 12px; border-radius: 4px; font-size: 10px; cursor: pointer;">
        DEV_MODE: OFF
      </button>
    </div>
  </nav>

  <!-- Workspace Grid -->
  <main class="workspace-root" id="workspace-manager">
    
    <!-- TOP: Prompt Console -->
    <section class="ws-panel area-top" id="panel-prompt">
      <div class="prompt-container">
        <textarea id="prompt-input" class="prompt-input" placeholder="Enter reasoning objective..."></textarea>
        <button id="run-btn" class="btn-run">RUN EXECUTION</button>
      </div>
    </section>

    <!-- LEFT: Reasoning Loop -->
    <aside class="ws-panel area-left" id="panel-loop">
      <div class="ws-panel-header">
        <div class="ws-panel-title">Reasoning Loop</div>
      </div>
      <div class="ws-panel-body" id="loop-container">
        <!-- Stages injected by JS -->
      </div>
    </aside>

    <!-- CENTER: Execution Trace -->
    <section class="ws-panel area-center" id="panel-trace">
      <div class="ws-panel-header">
        <div class="ws-panel-title">Execution Trace</div>
        <button class="mono" id="clear-trace" style="background: none; border: none; color: var(--tx3); font-size: 10px; cursor: pointer;">CLEAR</button>
      </div>
      <div class="ws-panel-body" id="trace-container">
        <div class="trace-log" id="trace-log"></div>
      </div>
    </section>

    <!-- RIGHT: Knowledge Graph -->
    <aside class="ws-panel area-right" id="panel-graph">
      <div class="ws-panel-header">
        <div class="ws-panel-title">Knowledge Graph</div>
      </div>
      <div class="ws-panel-body" id="graph-container" style="padding: 0; position: relative;">
        <canvas id="ws-graph-canvas"></canvas>
      </div>
    </aside>

    <!-- BOTTOM: System Metrics -->
    <footer class="ws-panel area-bottom" id="panel-metrics">
      <div class="ws-panel-header">
        <div class="ws-panel-title">System Telemetry</div>
      </div>
      <div class="ws-panel-body">
        <div class="metrics-grid" id="metrics-container">
          <!-- Metrics injected by JS -->
        </div>
      </div>
    </footer>

  </main>

  <!-- Scripts -->
  <script src="../assets/js/graph.js"></script> <!-- Reusing core graph logic if possible -->
  <script type="module" src="./workspaceManager.js"></script>
</body>
</html>
