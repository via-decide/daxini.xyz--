<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAXINI // Aporaksha Workspace</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0b0c0f">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../src/ui/workspace.css">
</head>
<body class="workspace-body">
    <nav class="workspace-nav" style="height:60px;background:#0f1320;border-bottom:1px solid #273449;display:flex;align-items:center;justify-content:space-between;padding:0 16px;">
        <a href="../" class="nav-brand" style="font-family:'Space Grotesk',sans-serif;font-weight:800;letter-spacing:1px;">DAXINI // APORAKSHA</a>
        <span style="font-size:12px;color:#93c5fd;">Unified Ecosystem Workspace</span>
    </nav>
    <div id="workspace-app"></div>
    <script type="module" src="../src/workspace/workspace.js"></script>

    <main class="workspace-layout">
        <aside class="panel" id="p-reasoning" aria-label="Reasoning Architecture">
            <header class="p-header">Modules / Tools</header>
            <div class="p-content" id="mount-reasoning-loop"></div>
        </aside>

        <section class="panel" id="p-trace" aria-label="Zayvora reasoning console">
            <header class="p-header">Zayvora Reasoning Console</header>
            <div class="p-content" id="mount-console-log">
                <div class="log-entry system">[SYSTEM] Bridge established. Zayvora-Nex gateway ready.</div>
            </div>
            <div class="workspace-input">
                <input type="text" id="main-prompt" placeholder="Input engineering constraints or research target..." autocomplete="off">
                <button id="send-prompt">EXECUTE ⤖</button>
            </div>
        </section>

        <aside class="panel" id="p-harness" aria-label="Live Harness">
            <header class="p-header">
                Live Harness
                <span class="p-meta" id="trace-meta">0 steps</span>
            </header>
            <div class="harness-controls" id="harness-controls">
                <button data-view="reasoning" class="active">Reasoning</button>
                <button data-view="execution" class="active">Execution</button>
                <button data-view="research" class="active">Research</button>
                <label class="debug-toggle">
                    <input type="checkbox" id="debug-toggle-input">
                    Debug
                </label>
            </div>
            <div class="p-content" id="zayvora-harness" aria-live="polite"></div>
        </aside>

        <footer class="panel" id="p-metrics" aria-label="Inference Metrics">
            <header class="p-header">System Telemetry</header>
            <div class="p-content" id="mount-metrics"></div>
        </footer>
    </main>

    <script type="module" src="./assets/js/workspaceApp.js"></script>
</body>
</html>
