<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#030508">
  <title>404 — Zayvora Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --void: #030508;
      --accent-cyan: #00e5ff;
      --accent-saffron: #ff671f;
      --text-muted: #888899;
      --border: rgba(255, 255, 255, 0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--void);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-saffron), var(--accent-cyan));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .msg {
      font-size: 1rem;
      color: var(--text-muted);
      margin: 1.5rem 0 2.5rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    a {
      font-size: 0.85rem;
      color: var(--accent-cyan);
      text-decoration: none;
      border: 1px solid rgba(0, 229, 255, 0.3);
      padding: 0.7rem 2rem;
      border-radius: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }
    a:hover {
      background: rgba(0, 229, 255, 0.1);
      border-color: var(--accent-cyan);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
    }
  </style>
</head>
<body>
  <div class="code">404</div>
  <p class="msg">Route not found in the sovereign grid</p>
  <a href="/">Return to Mission Control</a>
</body>
</html>
