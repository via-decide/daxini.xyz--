<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><title>SkillHex</title>
<style>
  body{margin:0;font-family:system-ui,sans-serif;background:#061226;color:#e5ecf4;padding:2rem;}
  h1{letter-spacing:.2em;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-top:1rem;}
  .tile{background:#0f1f3a;border:1px solid #1f2a4e;border-radius:6px;padding:.75rem;}
  .tile h3{margin:0 0 .25rem;font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:#a7b8d8;}
  .tile .val{font-family:monospace;font-size:1.5rem;color:#5b8cff;font-weight:700;}
  .user-tag{color:#8491a0;font-size:.85rem;margin-bottom:1rem;}
</style>
</head><body>
<h1>SKILLHEX</h1>
<p class="user-tag" id="user-tag">Loading passport…</p>
<div class="grid" id="grid"></div>
<script>
const user=localStorage.getItem("passport_user")||"anonymous";
document.getElementById("user-tag").textContent=`Passport: ${user}`;
const stored=JSON.parse(localStorage.getItem("skillhex_local")||"{}" );
const defaults=["reasoning","research","orchade","mars","toolkit"];
defaults.forEach(s=>{if(!(s in stored))stored[s]=0;});
const grid=document.getElementById("grid");
for(const [k,v] of Object.entries(stored)){
  const tile=document.createElement("div");
  tile.className="tile";
  tile.innerHTML=`<h3>${k}</h3><div class="val">${v}</div>`;
  grid.appendChild(tile);
}
</script>
</body></html>
