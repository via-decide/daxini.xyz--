# Zayvora Sovereign Gateway — Production Nginx Configuration (v4.0 Hardened)
# Layer 1: Edge Security (Rate Limiting, WAF basics, HSTS, HTTPS enforcement)

limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Block known bad user agents
map $http_user_agent $bad_agent {
    default 0;
    ~*(Scrapy|curl|Wget|python-requests|Go-http-client|sqlmap|nikto|nmap) 1;
    ~*(bot|crawl|spider|scan) 1;
}

server {
    listen 80;
    server_name api.daxini.xyz daxini.xyz;

    # Force HTTPS redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.daxini.xyz daxini.xyz;

    # SSL Configuration (managed by Cloudflare or Let's Encrypt)
    # ssl_certificate /etc/ssl/certs/daxini.xyz.pem;
    # ssl_certificate_key /etc/ssl/private/daxini.xyz.key;

    # ── Security Headers (Layer 1 + Layer 3) ──────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self'; img-src 'self' data:; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # ── Block bad agents ──────────────────────────────────
    if ($bad_agent) {
        return 403;
    }

    # ── Connection limits ─────────────────────────────────
    limit_conn conn_limit 20;

    # ── Payload size limit (Layer 6) ──────────────────────
    client_max_body_size 1m;

    # ── API Routes ────────────────────────────────────────
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate Limiting: 10 req/s with burst of 20
        limit_req zone=api burst=20 nodelay;

        # No caching for API
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Auth Routes (stricter rate limit) ─────────────────
    location /api/passport/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stricter rate limit for auth: 3 req/s
        limit_req zone=auth burst=5 nodelay;
    }

    # ── WebSocket ─────────────────────────────────────────
    location /workspace/terminal {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Static Assets ─────────────────────────────────────
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limit static too (generous)
        limit_req zone=api burst=50 nodelay;
    }

    # ── Block sensitive paths ─────────────────────────────
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~ /(admin|db_dump|config|internal_metrics|phpMyAdmin) {
        deny all;
        return 404;
    }

    # ── Logging ───────────────────────────────────────────
    access_log /var/log/nginx/zayvora_access.log;
    error_log /var/log/nginx/zayvora_error.log;
}
