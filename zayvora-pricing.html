<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zayvora AI Credits - Buy Now</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 5px;
    }

    .header .subtitle {
      font-size: 14px;
      opacity: 0.7;
    }

    .pricing-cards {
      display: grid;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      position: relative;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    .card.selected {
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
    }

    .card.popular {
      border-color: #667eea;
      background: white;
    }

    .card.popular::before {
      content: "BEST VALUE";
      position: absolute;
      top: -12px;
      left: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .card-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .card-info h3 {
      font-size: 24px;
      color: #333;
      margin-bottom: 4px;
    }

    .card-info p {
      font-size: 14px;
      color: #666;
    }

    .card-price {
      text-align: right;
    }

    .card-price .amount {
      font-size: 32px;
      font-weight: 700;
      color: #667eea;
      line-height: 1;
    }

    .card-price .period {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    .bonus-badge {
      display: inline-block;
      background: #10b981;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 12px;
    }

    .features {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }

    .features p {
      font-size: 14px;
      color: #555;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
    }

    .features p::before {
      content: "✓";
      margin-right: 8px;
      color: #10b981;
      font-weight: bold;
    }

    .features p:last-child {
      margin-bottom: 0;
    }

    .balance-info {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 30px;
      text-align: center;
    }

    .balance-info p {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .balance-info .balance {
      font-size: 28px;
      font-weight: 700;
    }

    .cta-section {
      display: grid;
      gap: 12px;
    }

    .btn {
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }

    .btn-secondary:hover {
      background: #f8f9fa;
    }

    .info-section {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .info-section h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      opacity: 0.9;
    }

    .info-section ul {
      list-style: none;
    }

    .info-section li {
      font-size: 13px;
      margin-bottom: 8px;
      opacity: 0.8;
      display: flex;
      align-items: flex-start;
    }

    .info-section li::before {
      content: "•";
      margin-right: 8px;
      margin-top: 2px;
    }

    .legal-links {
      text-align: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .legal-links a {
      color: white;
      text-decoration: none;
      font-size: 12px;
      margin: 0 8px;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .legal-links a:hover {
      opacity: 1;
    }

    .loading {
      display: none;
      text-align: center;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 3px solid white;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
      border-left: 4px solid #c33;
    }

    /* QR Code Modal */
    .qr-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .qr-modal-content {
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .qr-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #666;
    }

    .qr-modal-close:hover {
      color: #333;
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 28px;
      }

      .card {
        padding: 20px;
      }

      .card-info h3 {
        font-size: 20px;
      }

      .card-price .amount {
        font-size: 28px;
      }

      .qr-modal-content {
        max-width: 90vw;
        margin: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Zayvora AI</h1>
      <p>Credit Store</p>
      <p class="subtitle">Get instant access to advanced AI capabilities</p>
    </div>

    <!-- Current Balance -->
    <div class="balance-info" id="balanceSection" style="display: none;">
      <p>Your Current Balance</p>
      <div class="balance" id="currentBalance">0</div>
      <p style="font-size: 12px; margin-top: 8px;">Credits</p>
    </div>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage"></div>

    <!-- Pricing Cards -->
    <div class="pricing-cards" id="pricingCards"></div>

    <!-- CTA Section -->
    <div class="cta-section">
      <button class="btn btn-primary" id="buyBtn" onclick="initiatePayment()" disabled>
        <span>💳</span>
        <span>Buy Selected Credits</span>
      </button>
      <a href="mailto:dharam@viadecide.com?subject=Zayvora Support - Pricing Question" class="btn btn-secondary">
        📧 Get Support
      </a>
    </div>

    <!-- Info Section -->
    <div class="info-section">
      <h4>✓ Secure Payment</h4>
      <ul>
        <li>Powered by PhonePe & RBI</li>
        <li>Instant credit delivery</li>
        <li>All major UPI methods</li>
        <li>GST included in price</li>
      </ul>
    </div>

    <!-- Legal Links -->
    <div class="legal-links">
      <a href="/terms.html" target="_blank">Terms</a>
      <a href="/privacy.html" target="_blank">Privacy</a>
      <a href="/refunds.html" target="_blank">Refunds</a>
      <a href="mailto:dharam@viadecide.com?subject=Zayvora Support">Support</a>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
  <script>
    // ============================================================================
    // ZAYVORA PAYMENT ENGINE - Stateless UPI Payment Integration
    // ============================================================================

    // Global state
    let selectedPackage = null;
    let userBalance = 0;
    let currentPaymentIntent = null;
    let qrModal = null;

    const API_URL = '/api';
    const FRONTEND_URL = window.location.origin;
    const NODE_ID = 'macmini-gandhidham-01';
    const SECRET_KEY = 'zayvora-sovereign-secret-key-2026'; // Fallback secret (ideally from server)
    const UPI_ID = 'dharam@viadecide';
    const UPI_NAME = 'Zayvora%20Engine';

    // ============================================================================
    // SECTION 2: EXPLICIT PACKAGE DEFINITIONS
    // ============================================================================
    const PACKAGES = [
      {
        id: 'starter',
        credits: 50,
        price: 99,
        description: 'Getting Started'
      },
      {
        id: 'pro',
        credits: 120,
        price: 799,
        description: 'Heavy Users',
        bonus: '20%'
      },
      {
        id: 'enterprise',
        credits: 1000,
        price: 4999,
        description: 'Enterprise'
      }
    ];

    // ============================================================================
    // SECTION 3-4: CRYPTOGRAPHIC UTILITIES
    // ============================================================================

    // Helper: Convert string to ArrayBuffer
    function stringToArrayBuffer(str) {
      const encoder = new TextEncoder();
      return encoder.encode(str);
    }

    // Helper: Convert ArrayBuffer to hex string
    function arrayBufferToHex(buffer) {
      const view = new Uint8Array(buffer);
      let hex = '';
      for (let i = 0; i < view.length; i++) {
        hex += ('00' + view[i].toString(16)).slice(-2);
      }
      return hex;
    }

    // HMAC-SHA256 signature
    async function hmacSHA256(message, key) {
      try {
        const keyBuffer = stringToArrayBuffer(key);
        const messageBuffer = stringToArrayBuffer(message);

        const cryptoKey = await crypto.subtle.importKey(
          'raw',
          keyBuffer,
          { name: 'HMAC', hash: 'SHA-256' },
          false,
          ['sign']
        );

        const signature = await crypto.subtle.sign(
          'HMAC',
          cryptoKey,
          messageBuffer
        );

        return arrayBufferToHex(signature);
      } catch (error) {
        console.error('HMAC-SHA256 error:', error);
        // Fallback: simple hash (not cryptographically secure, for fallback only)
        return btoa(message + key).substring(0, 64);
      }
    }

    // Base64 encoding
    function base64Encode(str) {
      try {
        return btoa(unescape(encodeURIComponent(str)));
      } catch (e) {
        return btoa(str);
      }
    }

    // ============================================================================
    // SECTION 3: BUILD STATELESS PAYMENT INTENT
    // ============================================================================

    async function createPaymentIntent(packageId) {
      const pkg = PACKAGES.find(p => p.id === packageId);
      if (!pkg) {
        throw new Error('Invalid package');
      }

      const intentId = crypto.randomUUID();

      const intent = {
        intent_id: intentId,
        package_id: pkg.id,
        credits: pkg.credits,
        amount: pkg.price,
        timestamp: Date.now(),
        node_id: NODE_ID
      };

      // Encode payload to base64
      const payloadJson = JSON.stringify(intent);
      const payloadV1 = base64Encode(payloadJson);

      // Create signature
      const messageToSign = payloadV1 + intentId;
      const signature = await hmacSHA256(messageToSign, SECRET_KEY);

      return {
        intent,
        payload: payloadV1,
        signature,
        signed: true
      };
    }

    // ============================================================================
    // SECTION 5: BUILD SOVEREIGN DEEP LINK
    // ============================================================================

    function buildSovereignLink(paymentIntent) {
      const { intent, payload, signature } = paymentIntent;
      return `sov://${intent.node_id}/REVENUE_SETTLEMENT?payload=${payload}&sig=${signature}&intent=${intent.intent_id}`;
    }

    // ============================================================================
    // SECTION 6: CONVERT TO UPI PAYMENT LINK
    // ============================================================================

    function buildUPILink(paymentIntent) {
      const { intent } = paymentIntent;
      const upiLink = `upi://pay?pa=${UPI_ID}&pn=${UPI_NAME}&am=${intent.amount}&cu=INR&tn=ZAYVORA_${intent.intent_id.substring(0, 8)}`;
      return upiLink;
    }

    // ============================================================================
    // SECTION 7: QR CODE GENERATION
    // ============================================================================

    function generateQRCode(upiLink) {
      return new Promise((resolve) => {
        try {
          const qrCode = new QRCode({
            text: upiLink,
            width: 200,
            height: 200,
            colorDark: '#000000',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
          });
          const canvas = qrCode._canvas;
          resolve(canvas.toDataURL('image/png'));
        } catch (error) {
          console.error('QR generation error:', error);
          resolve(null);
        }
      });
    }

    function showQRFallback(paymentIntent, upiLink) {
      // Create modal for QR code
      const modal = document.createElement('div');
      modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
      `;

      const content = document.createElement('div');
      content.style.cssText = `
        background: white;
        border-radius: 16px;
        padding: 32px;
        max-width: 400px;
        text-align: center;
      `;

      const closeBtn = document.createElement('button');
      closeBtn.style.cssText = `
        position: absolute;
        top: 16px;
        right: 16px;
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
      `;
      closeBtn.innerHTML = '×';
      closeBtn.onclick = () => modal.remove();

      content.appendChild(closeBtn);

      const title = document.createElement('h3');
      title.textContent = 'Scan to Pay';
      title.style.cssText = 'margin-bottom: 16px; color: #333;';
      content.appendChild(title);

      const qrContainer = document.createElement('div');
      qrContainer.id = 'qr-fallback';
      qrContainer.style.cssText = 'margin-bottom: 20px;';
      content.appendChild(qrContainer);

      const fallbackText = document.createElement('p');
      fallbackText.innerHTML = `<small style="color: #666;">If QR doesn't work, copy this UPI link:</small><br><code style="font-size: 11px; word-break: break-all; background: #f0f0f0; padding: 8px; border-radius: 4px; display: block; margin-top: 10px;">${upiLink}</code>`;
      content.appendChild(fallbackText);

      const copyBtn = document.createElement('button');
      copyBtn.textContent = '📋 Copy UPI Link';
      copyBtn.style.cssText = `
        background: #667eea;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 12px;
        font-weight: 600;
      `;
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(upiLink);
        copyBtn.textContent = '✓ Copied!';
        setTimeout(() => { copyBtn.textContent = '📋 Copy UPI Link'; }, 2000);
      };
      content.appendChild(copyBtn);

      modal.appendChild(content);
      document.body.appendChild(modal);

      // Generate QR asynchronously
      generateQRCode(upiLink).then(qrImage => {
        if (qrImage) {
          const img = document.createElement('img');
          img.src = qrImage;
          img.style.cssText = 'width: 180px; height: 180px; margin: 0 auto;';
          qrContainer.appendChild(img);
        }
      });

      qrModal = modal;
    }

    // ============================================================================
    // SECTION 8: POST PAYMENT CREDIT DELIVERY
    // ============================================================================

    async function grantCredits(intentId, credits) {
      try {
        const response = await fetch(`${API_URL}/credits/grant`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            intent_id: intentId,
            credits: credits
          })
        });

        if (!response.ok) {
          const error = await response.json();
          console.error('Credit grant error:', error);
          return false;
        }

        const data = await response.json();
        return data.success || false;
      } catch (error) {
        console.error('Credit grant network error:', error);
        return false;
      }
    }

    // ============================================================================
    // PAGE INITIALIZATION
    // ============================================================================

    async function init() {
      try {
        // Check authentication
        const user = await checkAuth();
        if (user) {
          document.getElementById('balanceSection').style.display = 'block';
          await loadUserBalance(user.uid);
        }

        // Render packages
        renderPackages();

        // Listen for payment completion (from callback)
        window.addEventListener('message', handlePaymentCallback);
      } catch (error) {
        showError('Failed to load page: ' + error.message);
      }
    }

    async function checkAuth() {
      try {
        if (typeof firebase !== 'undefined' && firebase.auth) {
          return firebase.auth().currentUser;
        }
        return null;
      } catch (error) {
        console.error('Auth check error:', error);
        return null;
      }
    }

    async function loadUserBalance(uid) {
      try {
        const response = await fetch(`${API_URL}/credits/balance/${uid}`);
        if (response.ok) {
          const data = await response.json();
          userBalance = data.balance || 0;
          document.getElementById('currentBalance').textContent = userBalance.toLocaleString();
        }
      } catch (error) {
        console.error('Error loading balance:', error);
      }
    }

    // ============================================================================
    // RENDER PACKAGES WITH DYNAMIC PRICING
    // ============================================================================

    function renderPackages() {
      const container = document.getElementById('pricingCards');
      container.innerHTML = '';

      PACKAGES.forEach((pkg) => {
        const isPopular = pkg.bonus;
        const card = document.createElement('div');
        card.className = `card ${isPopular ? 'popular' : ''}`;
        card.onclick = () => selectPackage(pkg.id, card);

        const bonusText = pkg.bonus ? `
          <div class="bonus-badge">
            💰 ${pkg.bonus} Extra Credits
          </div>
        ` : '';

        // Calculate per-credit price dynamically
        const perCredit = (pkg.price / pkg.credits).toFixed(2);

        card.innerHTML = `
          <div class="card-content">
            <div class="card-info">
              <h3>${pkg.credits} Credits</h3>
              <p>Perfect for ${pkg.description.toLowerCase()}</p>
            </div>
            <div class="card-price">
              <div class="amount">₹${pkg.price}</div>
              <div class="period">One-time</div>
            </div>
          </div>
          ${bonusText}
          <div class="features">
            <p>₹${perCredit} per credit</p>
            <p>Instant delivery to your account</p>
            <p>Never expires, use anytime</p>
          </div>
        `;

        container.appendChild(card);
      });

      // Select first package by default
      if (container.firstChild) {
        selectPackage(PACKAGES[0].id, container.firstChild);
      }
    }

    // ============================================================================
    // PACKAGE SELECTION & PAYMENT INITIATION
    // ============================================================================

    function selectPackage(packageId, cardElement) {
      selectedPackage = packageId;
      document.querySelectorAll('.card').forEach(card => {
        card.classList.remove('selected');
      });
      cardElement.classList.add('selected');
      document.getElementById('buyBtn').disabled = false;
    }

    async function initiatePayment(pkg) {
      try {
        if (!selectedPackage) {
          showError('Please select a credit package');
          return;
        }

        const user = await checkAuth();
        if (!user) {
          showError('Please log in to purchase credits');
          // Redirect to login without leaving page
          return;
        }

        document.getElementById('buyBtn').disabled = true;
        const originalText = document.getElementById('buyBtn').innerHTML;
        document.getElementById('buyBtn').innerHTML = '<div class="spinner"></div> Generating payment link...';

        // Create payment intent
        const paymentIntent = await createPaymentIntent(selectedPackage);
        currentPaymentIntent = paymentIntent;

        // Build UPI link
        const upiLink = buildUPILink(paymentIntent);
        const sovereignLink = buildSovereignLink(paymentIntent);

        console.log('Payment Intent:', paymentIntent);
        console.log('UPI Link:', upiLink);
        console.log('Sovereign Link:', sovereignLink);

        // Store intent in session for callback verification
        sessionStorage.setItem('zayvora_intent_id', paymentIntent.intent.intent_id);
        sessionStorage.setItem('zayvora_credits', paymentIntent.intent.credits);

        // Attempt UPI payment
        const upiOpened = await attemptUPIPayment(upiLink, paymentIntent);

        if (!upiOpened) {
          // Show QR fallback
          showQRFallback(paymentIntent, upiLink);
        }

        document.getElementById('buyBtn').disabled = false;
        document.getElementById('buyBtn').innerHTML = originalText;

      } catch (error) {
        console.error('Payment error:', error);
        document.getElementById('buyBtn').disabled = false;
        document.getElementById('buyBtn').innerHTML = originalText;
        showError('Payment error: ' + error.message);
      }
    }

    async function attemptUPIPayment(upiLink, paymentIntent) {
      try {
        // For web, show fallback immediately
        // For native apps, this would trigger UPI intent
        return false;
      } catch (error) {
        console.error('UPI attempt error:', error);
        return false;
      }
    }

    function handlePaymentCallback(event) {
      // Listen for postMessage from UPI payment callback
      if (event.data.type === 'PAYMENT_SUCCESS') {
        const { intentId, credits } = event.data;
        if (intentId && credits) {
          grantCredits(intentId, credits).then(success => {
            if (success) {
              showError('✓ Credits added to your account!');
              renderPackages();
            }
          });
        }
      }
    }

    // ============================================================================
    // UI UTILITIES
    // ============================================================================

    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      if (!message.includes('✓')) {
        setTimeout(() => {
          errorEl.style.display = 'none';
        }, 5000);
      }
    }

    // Initialize on load
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
